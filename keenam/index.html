<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">

  <div class="overlay"></div>

  <div class="hero-content">

    <h1 id="typing"></h1>

    <p>
      Every love story is beautiful,
      but ours is my favorite.
    </p>

  </div>

</section>   

<p class="subtitle">
12 Desember 2025 ❤️
</p>

<div class="countdown">

    <div class="box">
        <span id="days">0</span>
        <small>Days</small>
    </div>

    <div class="box">
        <span id="hours">0</span>
        <small>Hours</small>
    </div>

    <div class="box">
        <span id="minutes">0</span>
        <small>Minutes</small>
    </div>

    <div class="box">
        <span id="seconds">0</span>
        <small>Seconds</small>
    </div>

</div>

<div id="particles"></div>

<div class="background-hearts"></div>

<div class="container">

    <div class="card">

        <h1>❤️ Untuk Kamu ❤️</h1>

        <div id="loveLetter"></div>

        <div id="timer"></div>

    </div>

</div>

<button id="playBtn">

🎵 Play Song

</button>

<audio
id="music"
loop>

<source
src="assets/music.mp3"
type="audio/mpeg">

</audio>

<script src="main.js"></script>

</body>
</html>
